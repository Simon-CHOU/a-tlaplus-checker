\* TLC Configuration for PolicyEngine.tla
\* Small finite universe for tractable model checking

SPECIFICATION
  Spec

CONSTANTS
  Actions       = {s3_GetObject, s3_PutObject, s3_DeleteObject}
  ResourceARNs  = {arn_bucket, arn_bucket_data}
